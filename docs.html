<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Docs – Star Services</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">★</div> Star Services
  </div>
  <button class="theme-toggle" onclick="toggleTheme()">🌗 Theme</button>
</header>

<div class="docs-wrapper">

  <div class="sidebar">
    <h3>Documentation</h3>
    <a href="index.html">← Back to Home</a>
    <a href="docs.html?page=getting-started">Getting Started</a>
    <a href="docs.html?page=advanced-config">Advanced Configuration</a>
  </div>

  <div class="content" id="doc-content">
    Loading…
  </div>

</div>

<footer>
  <div class="footer-links">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Media</a>
    <a href="#">Gallery</a>
    <a href="#">Contact</a>
  </div>

  <div class="social-icons">
    <a href="#">📘</a>
    <a href="#">💼</a>
    <a href="#">📸</a>
    <a href="#">💬</a>
    <a href="#">🐦</a>
  </div>

  © 2026 Company Ltd. All rights reserved.
</footer>

<script>
const params = new URLSearchParams(location.search);
const page = params.get("page") || "getting-started";

fetch(`templates/${page}.html`)
  .then(res => res.text())
  .then(html => document.getElementById("doc-content").innerHTML = html)
  .catch(() => document.getElementById("doc-content").innerHTML = "<h1>Page not found</h1>");
</script>

<script>
const root = document.documentElement;
const saved = localStorage.getItem("theme");
if (saved) root.setAttribute("data-theme", saved);

function toggleTheme() {
  const current = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
  root.setAttribute("data-theme", current);
  localStorage.setItem("theme", current);
}
</script>

</body>
</html>
