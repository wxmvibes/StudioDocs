<h1>Getting Started</h1>
<p>Welcome to Star Services. This guide walks you through your first setup.</p>

<h2>Install the CLI</h2>
<pre><code>npm install -g star-services-cli
</code></pre>

<h2>Initialize a project</h2>
<pre><code>star-services init --project my-first-app
</code></pre>

<p>After initialization, you can log in and start configuring your workspace.</p>
